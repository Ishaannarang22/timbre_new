<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="100%" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .serif { font-family: 'Fraunces', Georgia, serif; }
      .ink { fill: #1F1B16; }
      .muted { fill: #6B6258; }
      .micro { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1280" height="780" fill="#F7F1E6"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="256" height="780" fill="#F7F1E6" stroke="#E4D9C5" stroke-width="1"/>
  <text x="24" y="56" class="serif ink" font-size="26" font-weight="500">timbre</text>
  <text x="113" y="54" class="muted micro">care console</text>

  <text x="48" y="123" class="muted" font-size="14">Today's queue</text>
  <circle cx="32" cy="118" r="5" fill="none" stroke="#6B6258" stroke-width="1.5"/>

  <text x="48" y="161" class="muted" font-size="14">Live calls</text>
  <circle cx="32" cy="156" r="5" fill="none" stroke="#6B6258" stroke-width="1.5"/>

  <!-- Escalations active -->
  <rect x="12" y="178" width="232" height="36" rx="6" fill="#EFE7D7"/>
  <polygon points="29,193 35,193 32,200" fill="#1F1B16"/>
  <text x="48" y="199" class="ink" font-size="14" font-weight="500">Escalations</text>
  <rect x="200" y="186" width="22" height="20" rx="10" fill="#F4D9D2"/>
  <text x="211" y="200" font-size="10" font-weight="600" fill="#7A2A1A" text-anchor="middle">2</text>

  <text x="48" y="237" class="muted" font-size="14">Patient Voices</text>
  <rect x="28" y="227" width="9" height="9" rx="1.5" fill="none" stroke="#6B6258" stroke-width="1.5"/>
  <text x="48" y="275" class="muted" font-size="14">Patients</text>
  <rect x="28" y="265" width="9" height="11" rx="1" fill="none" stroke="#6B6258" stroke-width="1.5"/>
  <text x="48" y="313" class="muted" font-size="14">Cekura evals</text>
  <circle cx="32" cy="308" r="5" fill="none" stroke="#6B6258" stroke-width="1.5"/>

  <text x="24" y="752" class="muted micro">Demo data only — no real PHI.</text>

  <!-- Page header -->
  <line x1="256" y1="92" x2="1280" y2="92" stroke="#E4D9C5" stroke-width="1"/>
  <text x="288" y="56" class="serif ink" font-size="28" font-weight="500">Escalations</text>
  <text x="288" y="80" class="muted" font-size="13">Open red-flag alerts. The voice agent paged a human; the human picks up here.</text>

  <rect x="1148" y="46" width="108" height="26" rx="13" fill="#F4D9D2"/>
  <text x="1202" y="63" font-size="11" font-weight="600" fill="#7A2A1A" text-anchor="middle" letter-spacing="0.08em">2 OPEN ALERTS</text>

  <!-- Escalation cards -->
  <g transform="translate(288 124)">

    <!-- Urgent card -->
    <rect width="960" height="180" rx="10" fill="#FFFFFF" stroke="#B5402D" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="180" fill="#B5402D"/>

    <!-- Urgent chip -->
    <rect x="24" y="22" width="68" height="22" rx="11" fill="#F4D9D2"/>
    <text x="58" y="38" font-size="11" font-weight="700" fill="#7A2A1A" text-anchor="middle" letter-spacing="0.1em">URGENT</text>
    <!-- Maternal chip -->
    <rect x="100" y="22" width="84" height="22" rx="11" fill="#EFE7D7"/>
    <text x="142" y="38" font-size="11" font-weight="600" fill="#1F1B16" text-anchor="middle" letter-spacing="0.08em">MATERNAL</text>

    <text x="940" y="38" class="muted" font-size="12" text-anchor="end">12:14 PM · 6m ago</text>

    <text x="24" y="72" class="ink" font-size="16" font-weight="600">Maria Hernandez · escalate_to_nurse</text>
    <text x="24" y="92" class="muted" font-size="12">c-section · day 8 postpartum · Dr. Patel</text>

    <!-- Evidence quote box -->
    <rect x="24" y="106" width="912" height="42" rx="6" fill="#F7F1E6" stroke="#E4D9C5"/>
    <text x="36" y="132" class="ink" font-size="13" font-style="italic">"My incision feels warm and there's yellow fluid coming out. It started yesterday."</text>

    <text x="24" y="166" class="muted" font-size="12">Assigned: <tspan class="ink" font-weight="500">Dr. Patel (on-call)</tspan></text>
    <text x="940" y="166" class="ink" font-size="12" font-weight="500" text-anchor="end">↗ Acknowledge</text>

    <!-- Warning card -->
    <g transform="translate(0 200)">
      <rect width="960" height="160" rx="10" fill="#FFFFFF" stroke="#C68A2E" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="160" fill="#C68A2E"/>

      <!-- Warning chip -->
      <rect x="24" y="22" width="76" height="22" rx="11" fill="#F7E8CC"/>
      <text x="62" y="38" font-size="11" font-weight="700" fill="#7A5316" text-anchor="middle" letter-spacing="0.1em">WARNING</text>
      <!-- Billing chip -->
      <rect x="108" y="22" width="68" height="22" rx="11" fill="#EFE7D7"/>
      <text x="142" y="38" font-size="11" font-weight="600" fill="#1F1B16" text-anchor="middle" letter-spacing="0.08em">BILLING</text>

      <text x="940" y="38" class="muted" font-size="12" text-anchor="end">11:47 AM · 33m ago</text>

      <text x="24" y="72" class="ink" font-size="16" font-weight="600">Aisha Williams · medication_adherence</text>
      <text x="24" y="92" class="muted" font-size="12">c-section · day 5 postpartum · concierge routing</text>

      <rect x="24" y="106" width="912" height="34" rx="6" fill="#F7F1E6" stroke="#E4D9C5"/>
      <text x="36" y="128" class="ink" font-size="13" font-style="italic">"I can't afford $400 for the metformin. I just stopped taking it."</text>
    </g>

    <!-- Recent (resolved) section -->
    <g transform="translate(0 400)">
      <text x="0" y="20" class="serif ink" font-size="16" font-weight="500">Resolved today</text>
      <rect y="36" width="960" height="56" rx="10" fill="#FFFFFF" stroke="#E4D9C5"/>
      <rect x="24" y="50" width="76" height="20" rx="10" fill="#E6EDE5"/>
      <text x="62" y="64" font-size="10" font-weight="600" fill="#3F5A3E" text-anchor="middle" letter-spacing="0.08em">RESOLVED</text>
      <text x="120" y="64" class="ink" font-size="13" font-weight="500">Priya Patel · escalate_pediatric · cleared at 9:42 AM by Dr. Okafor</text>
    </g>

  </g>
</svg>
